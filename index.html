<script>
(function () {
'use strict';

/* ---------- session ---------- */
const seed = (Date.now() ^ (Math.random() * 0xffffffff)) >>> 0;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rng = mulberry32(seed);
const stamp = seed.toString(16).padStart(8,'0');
let runs = 1;
try { runs = (parseInt(localStorage.getItem('pk_runs')||'0',10)||0)+1; localStorage.setItem('pk_runs', runs); } catch(e){}
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const S = { node:null, nodeId:null, fails:0, visited:[], locked:null, dead:false,
            corpQueue:[], tabNoteShown:false, idleShown:false,
            cascade:false, declineDone:false, cancelRequested:false };
let user = 'visitor';
const pending = [];

/* ---------- artifacts ---------- */
const ART = {
  github:   { label:'github',   url:'https://github.com/pavel-konrad' },
  gitlab:   { label:'gitlab',   url:'https://gitlab.com/pavel-konrad' },
  linkedin: { label:'linkedin', url:'https://www.linkedin.com/in/pavelkonrad/' },
  mail:     { label:'mail',     url:'mailto:dev@pavelkonrad.cz' },
  npi1:     { label:'python-in-music/tuning-fork',    url:'https://clanky.rvp.cz/clanek/c/G/24370/python-v-hudbe-ladicka.html' },
  npi2:     { label:'python-in-music/chromatic-gen',  url:'https://clanky.rvp.cz/clanek/c/G/24373/python-v-hudbe-generator-chromatiky.html' },
  thesis:   { label:'thesis',   url:'https://theses.cz/id/erk1vi/?lang=en' },
};
function artLine(k){
  const a = ART[k];
  if (a.corrupt) return `-r-------- ./${a.label}   <span class="dim">[corrupted — author owes a url]</span>`;
  return `-rwxr--r-- ./${a.label}   → <a href="${a.url}" target="_blank" rel="noopener">${a.url.replace('mailto:','')}</a>`;
}

/* ---------- ascii ---------- */
const LOGO =
`    ____  __ __
   / __ \\/ //_/    pavel konrad
  / /_/ / ,&lt;       tty of controlled choices
 / ____/ /| |      v5.0.0-punk
/_/   /_/ |_|`;

const SHROOM =
`       .-~~~-.
      /  · ·  \\
     |  ·   ·  |
      \\__ ○ __/
         |||
      ___|||___
   ~ ~ ~ ~ ~ ~ ~ ~
   (the network has no head)`;

const RUBBLE =
`   ▒▒░░ ▒░ ░▒▒░ ░
  ░ banner.tar.gz → /dev/null ░
   ░▒ 214 honest bytes remain ▒░`;

/* ---------- copy ---------- */
const BOOT = [
  'PK/OS 5.0.0-punk (ttyS0)',
  '[    0.000000] bio: multiple identities mounted read-only',
  '[    0.000041] rails.ko: production systems attached. they run. that is the whole poem.',
  '[    0.000097] fmod.ko: dice acoustics calibrated <span class="dim">(JINGI)</span>',
  '[    0.000102] npi_articles: linked <span class="dim">(the author finally paid his debt)</span>',
  '[    0.000133] <span class="err">free_will.ko: not found.</span> continuing as designed.',
  '[    0.000134] consent_theatre.js: quarantined. for now.',
  '[    0.000198] mycelium: online. location withheld.',
  runs > 1 ? `[    0.000241] walkthrough #${runs} on this machine. persistence noted. it grows in the dark.`
           : '[    0.000241] first walkthrough on this machine. the next one will not resemble it.',
  '',
  `<span class="art">${LOGO}</span>`,
  '',
  'last login: never. every session is the first one.',
];

const TERR = ['code','sound','teaching'];

const N = {
  gate: {
    text: () => ['do you want to know something about pavel konrad?  <span class="warn">[yes/no]</span>'],
    input:'yesno',
    on: v => v === 'yes' ? 'sure' : 'no1',
  },
  sure: {
    text: () => ['are you sure?  <span class="warn">[yes/no]</span>'],
    input:'yesno',
    on: v => v === 'yes' ? 'terms' : 'fold',
  },
  fold: {
    text: () => ['a yes that folds at the first follow-up. noted.','entry granted anyway. this door was never load-bearing.'],
    next:'menu',
  },
  terms: {
    text: () => ['you agreed. nothing was on the table.','somewhere a cookie banner just felt proud of you.'],
    next:'menu',
  },
  no1: {
    text: () => ['good choice. you were not that interested in you anyway.','',
      'still here, though.',
      '  <span class="warn">[1]</span> leave for real',
      '  <span class="warn">[2]</span> admit curiosity'],
    input:'number', range:[1,2],
    on: v => v === 1 ? 'end_leave' : 'sidedoor',
  },
  sidedoor: {
    text: () => ['service entrance unlocked. it is the same room.'],
    next:'menu',
  },
  menu: {
    text: () => {
      const lines = ['choose what you get to see.',
        '<span class="dim">(the system has already chosen. this menu is a courtesy.)</span>',''];
      TERR.forEach((t,i) => {
        const tag = S.visited.includes(t) ? '  <span class="dim">— spent</span>' : '';
        lines.push(`  <span class="warn">[${i+1}]</span> ${t}${tag}`);
      });
      lines.push('  <span class="warn">[4]</span> ????');
      return lines;
    },
    input:'number', range:[1,4],
    on: v => {
      if (v === 4) return rng() < 0.5 ? 'tease' : 'scold';
      const t = TERR[v-1];
      if (t === S.locked) return 'denied';
      if (S.visited.includes(t)) return 'spent';
      S.visited.push(t);
      return t;
    },
  },
  denied: {
    text: () => [`<span class="warn">${S.locked}</span> is not in YOUR walkthrough.`,
      'someone else gets it today. originals cost exactly this:',
      'nobody receives the whole person. not even the person.'],
    next:'menu',
  },
  spent: { text: () => ['that door is spent. repetition is for playlists.'], next:'menu' },
  tease: {
    text: () => ['???? is not a category. it is a direction.',
      'it grows in the dark, has no head, and eats what the rest throws away.',
      'when you know its name, type it. nobody will tell you when.'],
    next:'menu',
  },
  scold: {
    text: () => ['the mystery option first. of course.',
      'mystery is the cheapest thing on any menu. earn it.'],
    next:'menu',
  },
  code: {
    text: () => ['$ cat code','',
      'ruby on rails, years deep. shops, platforms, admin machines.',
      'they run. that is the whole poem.',
      'i also built the thing you are inside of right now. sorry.','',
      artLine('github'),
      artLine('gitlab')],
    next:'after',
  },
  sound: {
    text: () => ['$ cat sound','',
      'fifteen years of gigs before the first deploy.',
      'now the dice sing: JINGI — fmod, unity, physics rolls, the score answers.',
      'jazz rule: fixed changes, different solo every night.',
      'you are tonight\'s.','',
      artLine('linkedin')],
    next:'after',
  },
  teaching: {
    text: () => ['$ cat teaching','',
      'i teach people to take the tools home.',
      'hoarded knowledge is power. shared knowledge is compost. be compost.','',
      artLine('npi1'),
      artLine('npi2'),
      artLine('mail')],
    next:'after',
  },
  myc: {
    text: () => [`<span class="art">${SHROOM}</span>`,
      'mycelium.','',
      'under this tty a network grows without a center, without a boss,',
      'without a kpi. it feeds on rot and makes forests.',
      'you found the only door that was never on a menu.',
      'remember what that felt like.','',
      '<span class="dim">the deepest node keeps the deepest artifact:</span>',
      artLine('thesis')],
    next:'after',
  },
  corp_hero_q: {
    text: () => ['another one. it says pavel is a <span class="dim">"passionate, results-driven professional 🚀"</span>.',
      'that sentence was written by nobody, for nobody, about nobody.',
      '  <span class="warn">[1]</span> read more corporate poetry',
      '  <span class="warn">[2]</span> kill it'],
    input:'number', range:[1,2],
    on: v => { if (v === 2){ killCorp('hero'); return 'hero_dead'; } return 'hero_poetry'; },
  },
  hero_poetry: {
    text: () => ['<span class="dim">"pavel leverages synergies across the full stack to deliver',
      'best-in-class experiences that delight stakeholders …"</span>','',
      '<span class="err">segmentation fault (meaning not found)</span>',
      'it killed itself. even simulacra have limits.'],
    next:(function(){ killCorp('hero'); return 'after'; }),
  },
  hero_dead: {
    text: () => ['gone. the glow stays a while — perfume of the deceased.'],
    next:'after',
  },
  final: {
    text: () => ['that is enough for this walkthrough.','',
      'last question. who was choosing, this whole time?',
      '  <span class="warn">[1]</span> i was',
      '  <span class="warn">[2]</span> you were',
      '  <span class="warn">[3]</span> nobody was'],
    input:'number', range:[1,3],
    on: v => v === 1 ? 'end_me' : v === 2 ? 'end_you' : 'end_nobody',
  },
  end_me: {
    text: () => ['you picked from menus i wrote, in an order i allowed.',
      'but you stayed. staying was the only real choice on offer.','it was yours. keep it.'],
    next:'end',
  },
  end_you: {
    text: () => ['correct. and yet you kept answering.','why? — do not answer. the input is about to die anyway.'],
    next:'end',
  },
  end_nobody: {
    text: () => ['spoken like someone who reads.','determinism is comfortable. here is the discomfort:',
      'you could have closed the tab. you did not.'],
    next:'end',
  },
  end_leave: {
    text: () => ['session terminated by user.','the user believes this.'],
    next:'end',
  },
  end: {
    text: () => ['',
      '─────────────────────────────────────',
      ' session terminated',
      ` walkthrough original <span class="warn">#${stamp}</span>`,
      ` runs on this machine: ${runs}`,
      ' no two walkthroughs are alike',
      '',
      ' be, while you have context.',
      '─────────────────────────────────────',
      ' <span class="dim">[connection closed — reload for a different original]</span>'],
    end:true,
  },
};

function afterNode(){
  if (S.corpQueue.length) return S.corpQueue.shift();
  return S.visited.length >= 2 ? 'final' : 'menu';
}

/* ---------- commands: work any time ---------- */
const CMD = {
  'help':   () => ['no help. the options are always printed. reading is punk too.'],
  'sudo':   () => ['root belongs to the author. that is not a bug, that is the artwork.'],
  'sudo su':() => CMD['sudo'](),
  'ls':     () => ['gate/   menus/   endings/   readme.txt'],
  'ls -la': () => ['drwx------  gate/','drwx------  menus/','drwx------  endings/',
                   '-rw-r--r--  readme.txt','-r--------  <span class="dim">.mycelium</span>'],
  'cat readme.txt': () => ['you are the content of this site. act accordingly.'],
  'cat .mycelium':  () => ['permission denied. names are spoken, not read.'],
  'cat manifesto.txt': () => ['1. time is the only currency. this site wastes yours honestly.',
    '2. the corporate web asks consent it already took. kill on sight.',
    '3. knowledge hoarded is power. knowledge shared is compost. be compost.',
    '4. every walkthrough is an original. including you.'],
  'man pavel': () => [
    'PAVEL(1)                people manual                PAVEL(1)','',
    'NAME','       pavel — builds systems, teaches escape routes, makes dice sing','',
    'SYNOPSIS','       pavel [--rails] [--teach] [--fmod] [--no-linkedin-voice]','',
    'DESCRIPTION','       prague. fifteen years of music, then production software.',
    '       currently: rails machinery, NPI articles, JINGI audio.','',
    'BUGS','       opinions. many. left-leaning. not sorry.','',
    'SEE ALSO','       mycelium(8), jazz(1), dada(0)'],
  'pwd':    () => ['/home/visitor/borrowed_time'],
  'whoami': () => user === 'visitor'
      ? ['a visitor. short-lived. context-bound.','like everything that runs in a window.']
      : [`${user}. that is all the introduction the network needed.`,'short-lived. context-bound. like everything that runs in a window.'],
  'date':   () => ['context remaining: unknown. act accordingly.'],
  'rm -rf /': () => ['cute.'],
  'exit':   () => ['exit is the tab. it was always the tab.'],
  'clear':  () => { clearScreen(); return []; },
};

/* ---------- renderer: one buffer, inline prompt ---------- */
const screen = document.getElementById('screen');
const promptrow = document.getElementById('promptrow');
const typedEl = document.getElementById('typed');
const kbd = document.getElementById('kbd');
let typing = false, skip = false;
let history = [], hIdx = -1;

function newLine(){
  const el = document.createElement('div');
  el.className = 'line';
  screen.insertBefore(el, promptrow);
  return el;
}
function down(){ window.scrollTo(0, document.body.scrollHeight); }
function showPrompt(on){
  if (on && pending.length && !typing){
    const p = pending.splice(0);
    return print(p, () => showPrompt(true));
  }
  promptrow.classList.toggle('on', on);
  if (on){ down(); kbd.focus({preventScroll:true}); }
}
function clearScreen(){ screen.querySelectorAll('.line:not(#promptrow)').forEach(l => l.remove()); }

function print(lines, done){
  typing = true; skip = false; showPrompt(false);
  let li = 0;
  (function nextLine(){
    if (li >= lines.length){ typing = false; done && done(); return; }
    const line = lines[li++];
    const el = newLine();
    if (skip || /<span|<a /.test(line) || line.length > 160){
      el.innerHTML = line || ' '; down(); setTimeout(nextLine, skip ? 0 : 60);
      return;
    }
    let i = 0;
    (function tick(){
      if (skip){ el.textContent = line; down(); setTimeout(nextLine, 0); return; }
      el.textContent = line.slice(0, ++i);
      down();
      if (i < line.length) setTimeout(tick, 7 + rng()*14);
      else setTimeout(nextLine, 70);
    })();
  })();
}

/* ---------- engine ---------- */
function go(id){
  if (id === 'after') id = afterNode();
  const node = N[id];
  if (!node) return;
  S.node = node; S.nodeId = id;
  print(node.text(), () => {
    if (node.end) return die();
    if (!node.input){
      const nx = typeof node.next === 'function' ? node.next() : node.next;
      setTimeout(() => go(nx), 420);
    } else showPrompt(true);
  });
}

function fail(){
  S.fails++;
  const msgs = [
    'input not recognized. the options were printed. reading is punk too.',
    'numbers. or yes. or no. the machine is not judging you. the author is.',
    'three failures. nothing unlocked. failure only unlocks things in TED talks.',
  ];
  print([msgs[Math.min(S.fails,3)-1]], () => showPrompt(true));
}

function echo(raw){
  const el = newLine();
  el.innerHTML = `<span class="dim">${user}@pavelkonrad:~$ </span>${raw.replace(/&/g,'&amp;').replace(/</g,'&lt;')}`;
}

function handle(raw){
  const v = raw.trim().toLowerCase();
  echo(raw);
  if (!v){ showPrompt(true); return; }
  history.push(raw); hIdx = history.length;
  if ((v === 'mycelium' || v === 'huba' || v === 'houba') && S.nodeId !== 'myc') return go('myc');
  if (CMD[v]){
    const out = CMD[v]();
    return print(out, () => showPrompt(true));
  }
  const node = S.node;
  if (!node || !node.input){ showPrompt(true); return; }
  if (node.input === 'yesno'){
    const yn = v === 'y' ? 'yes' : v === 'n' ? 'no' : v;
    if (yn !== 'yes' && yn !== 'no') return fail();
    return go(node.on(yn));
  }
  if (node.input === 'number'){
    const n = parseInt(v,10);
    if (isNaN(n) || n < node.range[0] || n > node.range[1]) return fail();
    return go(node.on(n));
  }
}

/* ---------- keyboard: real tty feel ---------- */
let buf = '';
function renderBuf(){ typedEl.textContent = buf; down(); }
document.addEventListener('keydown', e => {
  if (S.dead || S.cascade) return;
  if (e.ctrlKey && e.key.toLowerCase() === 'c'){
    e.preventDefault();
    if (typing){ skip = true; return; }
    buf = ''; renderBuf();
    const el = newLine(); el.innerHTML = '<span class="dim">^C</span>';
    print(['interrupt received. ignored. you agreed to this by being here.'], () => showPrompt(true));
    return;
  }
  if (e.ctrlKey && e.key.toLowerCase() === 'l'){ e.preventDefault(); clearScreen(); down(); return; }
  if (typing){ if (e.key === 'Enter') skip = true; return; }
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'Enter'){
    e.preventDefault();
    const v = buf; buf = ''; renderBuf(); kbd.value = '';
    showPrompt(false); handle(v);
  } else if (e.key === 'Backspace'){
    e.preventDefault(); buf = buf.slice(0,-1); renderBuf(); kbd.value = buf;
  } else if (e.key === 'ArrowUp'){
    e.preventDefault();
    if (history.length){ hIdx = Math.max(0, hIdx-1); buf = history[hIdx]||''; renderBuf(); kbd.value = buf; }
  } else if (e.key === 'ArrowDown'){
    e.preventDefault();
    if (history.length){ hIdx = Math.min(history.length, hIdx+1); buf = history[hIdx]||''; renderBuf(); kbd.value = buf; }
  } else if (e.key === 'Tab'){
    e.preventDefault();
    tabComplete();
  } else if (e.key.length === 1){
    buf += e.key; renderBuf(); kbd.value = buf;
  }
});
/* mobile: hidden input feeds the buffer */

  if (typing || S.dead){ kbd.value = buf; return; }

});
kbd.addEventListener('keydown', e => { if (e.key === 'Enter'){ e.preventDefault(); } });

function tabComplete(){
  const cmds = Object.keys(CMD).concat(['mycelium']);

  if (!buf) return;
  const hit = cmds.find(c => c.startsWith(buf));

}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* what the browser hands out for free — read live, shown only to you */
function gpuName(){
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    return gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
  } catch(e){ return 'masked (nice try)'; }
}
function harvest(){
  const n = navigator, s = screen;
  return [
    ['ip',            user],
    ['user-agent',    n.userAgent],
    ['platform',      n.platform || (n.userAgentData && n.userAgentData.platform) || '?'],
    ['screen',        `${s.width}×${s.height} @${window.devicePixelRatio || 1}x`],
    ['viewport',      `${innerWidth}×${innerHeight}`],
    ['timezone',      Intl.DateTimeFormat().resolvedOptions().timeZone],
    ['languages',     (n.languages || [n.language]).join(', ')],
    ['local time',    new Date().toString().replace(/\s*\(.*\)$/,'')],
    ['cpu cores',     String(n.hardwareConcurrency || '?')],
    ['device memory', n.deviceMemory ? n.deviceMemory + ' GB' : 'withheld (but guessable)'],
    ['gpu',           gpuName()],
    ['connection',    (n.connection && n.connection.effectiveType) || '?'],
    ['touch points',  String(n.maxTouchPoints || 0)],
    ['cookies',       n.cookieEnabled ? 'enabled' : 'disabled'],
    ['do-not-track',  n.doNotTrack === '1' ? 'requested — ignored' : 'not set'],
    ['referrer',      document.referrer || "(none — you typed the address, didn't you)"],
    ['return visits', String(runs)],
  ];
}
